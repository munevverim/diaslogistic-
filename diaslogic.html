<!-- Dias Logic — Geoteknik Mühendislik Yazılımları -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dias Logic — Geoteknik Mühendislik Yazılımları</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#38B6FF;        /* marka mavisi (vurgu) */
  --blue-600:#1893E6;
  --blue-700:#1278C2;
  --blue-050:#EAF6FF;
  --ink:#2E2E30;         /* marka antrasiti */
  --ink-2:#54585E;
  --ink-3:#8A8F96;
  --paper:#F4F7FA;
  --white:#ffffff;
  --slate:#0F1620;       /* koyu bölümler */
  --slate-2:#17222F;
  --line:#E3E9EF;
  --line-2:#D5DDE5;
  /* zemin tabakası tonları (yalnızca kesit illüstrasyonunda) */
  --s1:#E9DDC7; --s2:#DAC4A4; --s3:#CBB78F; --s4:#BBC4CE;
  --ok:#2BB673; --warn:#E2A33C;
  --radius:14px;
  --shadow:0 1px 2px rgba(20,30,45,.04), 0 12px 30px -16px rgba(20,30,45,.18);
  --shadow-lg:0 30px 70px -30px rgba(15,30,50,.45);
  --maxw:1180px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;font-family:'Inter',system-ui,sans-serif;color:var(--ink);
  background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--ink);line-height:1.12;margin:0}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.mono{font-family:'Space Mono',monospace}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--blue);color:#04263d}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:.5rem;border:1px solid transparent;border-radius:9px;
  padding:.72rem 1.25rem;font-weight:600;font-size:.93rem;transition:.18s;white-space:nowrap}
.btn-primary{background:var(--blue-700);color:#fff}
.btn-primary:hover{background:var(--blue-600);transform:translateY(-1px);box-shadow:0 10px 22px -10px rgba(18,120,194,.7)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line-2)}
.btn-ghost:hover{border-color:var(--ink);background:#fff}
.btn-light{background:#fff;color:var(--ink)}
.btn-light:hover{transform:translateY(-1px);box-shadow:0 12px 28px -14px rgba(0,0,0,.45)}
.btn-blue{background:var(--blue);color:#06304d}
.btn-blue:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn-sm{padding:.5rem .85rem;font-size:.84rem}
.btn-block{width:100%;justify-content:center}

/* ---------- top strip ---------- */
.strip{background:var(--ink);color:#cfd4da;font-size:.8rem}
.strip .wrap{display:flex;align-items:center;justify-content:center;gap:1.4rem;height:36px;flex-wrap:wrap}
.strip b{color:var(--blue);font-weight:700}
.strip span{display:inline-flex;align-items:center;gap:.4rem}

/* ---------- header ---------- */
header.site{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:1.5rem;height:70px}
.brand{display:flex;align-items:center;gap:.6rem;font-family:'Space Grotesk';font-weight:700;font-size:1.18rem}
.brand img{height:40px;width:40px;object-fit:contain}
.brand .bn{letter-spacing:-.02em}
.brand .bn span{color:var(--blue)}
.nav-links{display:flex;align-items:center;gap:.3rem;margin-left:.5rem}
.nav-links a{padding:.5rem .7rem;border-radius:8px;font-size:.92rem;font-weight:500;color:var(--ink-2);transition:.15s}
.nav-links a:hover{color:var(--ink);background:var(--blue-050)}
.nav-links a.active{color:var(--blue-700);background:var(--blue-050)}
.nav-cta{margin-left:auto;display:flex;align-items:center;gap:.6rem}
.burger{display:none;background:none;border:1px solid var(--line-2);border-radius:8px;width:42px;height:42px;align-items:center;justify-content:center}
.burger span{display:block;width:18px;height:2px;background:var(--ink);position:relative}
.burger span::before,.burger span::after{content:'';position:absolute;left:0;width:18px;height:2px;background:var(--ink)}
.burger span::before{top:-6px}.burger span::after{top:6px}

/* ---------- sections ---------- */
section{padding:84px 0}
.eyebrow{font-family:'Space Mono';font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;color:var(--blue-700);font-weight:700;margin-bottom:.9rem;display:flex;align-items:center;gap:.6rem}
.eyebrow::before{content:'';width:26px;height:2px;background:var(--blue)}
.sec-head{max-width:640px;margin-bottom:48px}
.sec-head h2{font-size:clamp(1.8rem,3.4vw,2.5rem);letter-spacing:-.02em}
.sec-head p{color:var(--ink-2);font-size:1.05rem;margin-top:.8rem}

/* ---------- hero ---------- */
.hero{padding:64px 0 72px;position:relative;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.05fr 1.15fr;gap:48px;align-items:center}
.hero .tag{display:inline-flex;align-items:center;gap:.5rem;background:var(--blue-050);color:var(--blue-700);
  font-family:'Space Mono';font-size:.76rem;font-weight:700;letter-spacing:.04em;padding:.4rem .8rem;border-radius:100px;border:1px solid #cfeaff}
.hero h1{font-size:clamp(2.3rem,4.6vw,3.55rem);letter-spacing:-.03em;margin:1.2rem 0 1.1rem}
.hero h1 em{font-style:normal;color:var(--blue-700);position:relative}
.hero h1 em::after{content:'';position:absolute;left:0;right:0;bottom:.06em;height:.16em;background:var(--blue);opacity:.35;border-radius:2px}
.hero p.lead{font-size:1.13rem;color:var(--ink-2);max-width:520px}
.hero-actions{display:flex;gap:.8rem;margin:1.8rem 0 1.5rem;flex-wrap:wrap}
.hero-meta{display:flex;gap:1.8rem;flex-wrap:wrap;font-size:.85rem;color:var(--ink-2)}
.hero-meta b{color:var(--ink);font-family:'Space Grotesk'}
.hero-meta div{display:flex;flex-direction:column}
.hero-meta .n{font-size:1.5rem;color:var(--blue-700)}

/* cross-section panel */
.section-panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow-lg);position:relative}
.section-panel .cap{display:flex;align-items:center;justify-content:space-between;padding:.2rem .5rem .7rem}
.section-panel .cap .dot{width:9px;height:9px;border-radius:50%;background:#e2e6ea;display:inline-block;margin-right:5px}
.section-panel .cap .dot.b{background:var(--blue)}
.section-panel .cap .lbl{font-family:'Space Mono';font-size:.72rem;color:var(--ink-3)}
.csvg{width:100%;height:auto;display:block;border-radius:10px;background:linear-gradient(#fbfcfd,#f3f6f9)}

/* strata animation */
.stratum{opacity:0;transform:translateY(8px);animation:rise .7s cubic-bezier(.2,.7,.3,1) forwards}
@keyframes rise{to{opacity:1;transform:none}}
.slipline{stroke-dasharray:520;stroke-dashoffset:520;animation:draw 1.5s .6s ease forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.mass{opacity:0;animation:fadein .8s 1.1s forwards}
.gw{opacity:0;animation:fadein .8s 1.3s forwards}
@keyframes fadein{to{opacity:1}}
.fspill{opacity:0;animation:pop .5s 1.5s cubic-bezier(.2,1.4,.4,1) forwards}
@keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:none}}

/* ---------- trust ---------- */
.trust{padding:40px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:#fff}
.trust .wrap{display:flex;align-items:center;gap:2rem;flex-wrap:wrap;justify-content:center}
.trust p{font-family:'Space Mono';font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin:0}
.trust .logos{display:flex;gap:2.4rem;flex-wrap:wrap;align-items:center;justify-content:center}
.trust .logos span{font-weight:700;color:var(--ink-3);font-family:'Space Grotesk';opacity:.8;font-size:1.05rem}

/* ---------- product cards ---------- */
.grid{display:grid;gap:20px}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:22px;transition:.18s;display:flex;flex-direction:column}
.card:hover{border-color:#bfe3ff;box-shadow:var(--shadow);transform:translateY(-3px)}
.prod .ico{width:46px;height:46px;border-radius:11px;background:var(--blue-050);display:flex;align-items:center;justify-content:center;margin-bottom:14px;border:1px solid #d4ecff}
.prod .ico svg{width:24px;height:24px;stroke:var(--blue-700);fill:none;stroke-width:1.6}
.prod .ptag{font-family:'Space Mono';font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--blue-700);font-weight:700}
.prod h3{font-size:1.18rem;margin:.35rem 0 .5rem;letter-spacing:-.01em}
.prod p{color:var(--ink-2);font-size:.9rem;margin:0 0 14px;flex:1}
.prod .more{font-size:.85rem;font-weight:600;color:var(--blue-700);display:inline-flex;gap:.3rem;align-items:center}
.prod .more::after{content:'→';transition:.15s}
.card:hover .prod .more::after{transform:translateX(3px)}
.badge{display:inline-block;font-family:'Space Mono';font-size:.66rem;font-weight:700;padding:.15rem .45rem;border-radius:5px;background:var(--ink);color:#fff;margin-left:.4rem;vertical-align:middle}

/* ---------- solutions (dark) ---------- */
.dark{background:var(--slate);color:#d9e0e8}
.dark h2,.dark h3{color:#fff}
.dark .sec-head p{color:#9aa6b2}
.sol{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.soltab{text-align:left;background:var(--slate-2);border:1px solid #243343;border-radius:12px;padding:18px;color:#cdd6df;transition:.18s}
.soltab:hover,.soltab.on{border-color:var(--blue);background:#10283d}
.soltab .si{width:34px;height:34px;color:var(--blue);margin-bottom:10px}
.soltab .si svg{width:30px;height:30px;stroke:var(--blue);fill:none;stroke-width:1.5}
.soltab h4{font-size:1rem;color:#fff;margin-bottom:.3rem}
.soltab small{color:#8595a4;font-size:.8rem}
.solpanel{margin-top:22px;background:var(--slate-2);border:1px solid #243343;border-radius:16px;padding:30px;display:grid;grid-template-columns:1.3fr 1fr;gap:30px;align-items:center}
.solpanel ul{list-style:none;padding:0;margin:14px 0 0;display:flex;flex-wrap:wrap;gap:.5rem}
.solpanel ul li{font-family:'Space Mono';font-size:.78rem;background:#0c1c2b;border:1px solid #25384a;color:var(--blue);padding:.35rem .7rem;border-radius:7px}
.solpanel .pic{aspect-ratio:4/3;border-radius:12px;background:linear-gradient(135deg,#14283b,#0b1825);border:1px solid #243343;display:flex;align-items:center;justify-content:center}

/* ---------- features ---------- */
.feat{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.feat .f{padding:6px 0}
.feat .fi{width:44px;height:44px;border-radius:11px;background:var(--ink);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.feat .fi svg{width:22px;height:22px;stroke:var(--blue);fill:none;stroke-width:1.7}
.feat h4{font-size:1.1rem;margin-bottom:.4rem}
.feat p{color:var(--ink-2);font-size:.92rem;margin:0}

/* ---------- stats band ---------- */
.stats{background:linear-gradient(120deg,var(--blue-700),var(--blue-600));color:#fff}
.stats .wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;text-align:center}
.stats .n{font-family:'Space Grotesk';font-size:2.6rem;font-weight:700;line-height:1}
.stats .l{opacity:.85;font-size:.9rem;margin-top:.4rem}

/* ---------- blog cards ---------- */
.post{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:.18s}
.post:hover{box-shadow:var(--shadow);transform:translateY(-3px);border-color:#bfe3ff}
.post .cover{height:148px;display:flex;align-items:center;justify-content:center;font-size:2.6rem;position:relative}
.post .cover .ct{position:absolute;top:12px;left:12px;font-family:'Space Mono';font-size:.66rem;font-weight:700;background:rgba(255,255,255,.92);color:var(--ink);padding:.25rem .55rem;border-radius:6px;letter-spacing:.05em}
.post .pb{padding:18px 20px 20px;display:flex;flex-direction:column;flex:1}
.post h3{font-size:1.12rem;letter-spacing:-.01em;margin-bottom:.45rem}
.post p{color:var(--ink-2);font-size:.88rem;margin:0 0 14px;flex:1}
.post .meta{font-size:.78rem;color:var(--ink-3);display:flex;gap:.6rem;align-items:center}

/* ---------- CTA band ---------- */
.ctaband{background:var(--ink);color:#fff;border-radius:22px;padding:54px;display:flex;align-items:center;justify-content:space-between;gap:30px;flex-wrap:wrap;position:relative;overflow:hidden}
.ctaband::before{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(56,182,255,.35),transparent 70%)}
.ctaband h2{font-size:clamp(1.6rem,3vw,2.2rem);color:#fff;position:relative}
.ctaband p{color:#aeb6bf;margin:.6rem 0 0;position:relative}
.ctaband .acts{display:flex;gap:.8rem;position:relative;flex-wrap:wrap}

/* ---------- footer ---------- */
footer.site{background:var(--slate);color:#9aa6b2;padding:62px 0 30px;margin-top:10px}
.fgrid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:36px;padding-bottom:36px;border-bottom:1px solid #20303f}
footer .brand{color:#fff;font-size:1.3rem;margin-bottom:.8rem}
footer .brand img{filter:none}
footer p.desc{font-size:.88rem;max-width:300px}
footer h5{color:#fff;font-family:'Space Grotesk';font-size:.95rem;margin:0 0 14px}
footer ul{list-style:none;padding:0;margin:0}
footer ul li{margin-bottom:.55rem}
footer ul li a{font-size:.88rem;color:#9aa6b2;transition:.15s}
footer ul li a:hover{color:var(--blue)}
.fbot{display:flex;justify-content:space-between;align-items:center;padding-top:24px;font-size:.82rem;flex-wrap:wrap;gap:10px}
.fbot a{color:#9aa6b2}.fbot a:hover{color:var(--blue)}

/* ---------- generic page ---------- */
.page{padding:54px 0 80px;min-height:60vh}
.page-hd{background:var(--slate);color:#fff;padding:56px 0}
.page-hd .eyebrow{color:var(--blue)}
.page-hd h1{font-size:clamp(2rem,4vw,2.8rem);letter-spacing:-.02em}
.page-hd p{color:#9aa6b2;max-width:620px;margin-top:.8rem}
.crumb{font-size:.82rem;color:var(--ink-3);margin-bottom:1.4rem}
.crumb a{color:var(--blue-700)}

/* blog list */
.bloglist{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.cats{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:30px}
.chip{font-size:.84rem;font-weight:500;padding:.45rem .9rem;border-radius:100px;border:1px solid var(--line-2);background:#fff;color:var(--ink-2);transition:.15s}
.chip:hover,.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* article */
.article{max-width:760px;margin:0 auto}
.article .cover{height:240px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:4rem;margin-bottom:30px}
.article h1{font-size:clamp(1.8rem,3.6vw,2.5rem);letter-spacing:-.02em;margin-bottom:.8rem}
.article .ameta{font-size:.85rem;color:var(--ink-3);margin-bottom:30px;display:flex;gap:.7rem;align-items:center;flex-wrap:wrap}
.article .body{font-size:1.06rem;color:#33373c}
.article .body p{margin:0 0 1.2rem}
.article .body h3{font-size:1.4rem;margin:2rem 0 .8rem}
.article .body ul{margin:0 0 1.2rem;padding-left:1.2rem}
.article .body li{margin-bottom:.4rem}
.article .body strong{color:var(--ink)}

/* forum */
.forum-cats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:34px}
.fcat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;display:flex;gap:12px;align-items:flex-start}
.fcat .fi{width:40px;height:40px;border-radius:10px;background:var(--blue-050);display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:1.2rem}
.fcat h4{font-size:1rem;margin-bottom:.2rem}
.fcat small{color:var(--ink-3);font-size:.82rem}
.topic{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;display:flex;gap:16px;align-items:center;margin-bottom:12px;transition:.15s}
.topic:hover{border-color:#bfe3ff;box-shadow:var(--shadow)}
.topic .av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-700));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Space Grotesk';flex:0 0 auto}
.topic .tmain{flex:1;min-width:0}
.topic .tmain h4{font-size:1.02rem;margin-bottom:.2rem}
.topic .tmain .tm{font-size:.8rem;color:var(--ink-3);display:flex;gap:.6rem;flex-wrap:wrap}
.topic .tcat{font-family:'Space Mono';font-size:.66rem;background:var(--blue-050);color:var(--blue-700);padding:.2rem .5rem;border-radius:5px;font-weight:700}
.topic .rc{text-align:center;flex:0 0 auto}
.topic .rc b{font-family:'Space Grotesk';font-size:1.2rem;display:block;color:var(--ink)}
.topic .rc small{font-size:.7rem;color:var(--ink-3)}
.reply{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px;display:flex;gap:14px}
.reply.op{border-color:#bfe3ff;background:linear-gradient(#fff,#f7fbff)}
.reply .av{flex:0 0 auto}
.reply .rbody h5{font-size:.92rem;margin-bottom:.1rem;display:flex;align-items:center;gap:.5rem}
.reply .rbody .op-b{font-family:'Space Mono';font-size:.6rem;background:var(--blue-700);color:#fff;padding:.1rem .35rem;border-radius:4px}
.reply .rbody .rt{font-size:.75rem;color:var(--ink-3)}
.reply .rbody .rc{margin-top:.5rem;color:#33373c;font-size:.94rem;white-space:pre-wrap}

/* forms */
.field{margin-bottom:16px}
.field label{display:block;font-size:.85rem;font-weight:600;margin-bottom:.4rem;color:var(--ink)}
.field input,.field textarea,.field select{width:100%;padding:.7rem .85rem;border:1px solid var(--line-2);border-radius:9px;font-family:inherit;font-size:.94rem;background:#fff;color:var(--ink);transition:.15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(56,182,255,.15)}
.field textarea{resize:vertical;min-height:120px}
.field .hint{font-size:.76rem;color:var(--ink-3);margin-top:.3rem}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.formcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px}

/* admin */
.admin-shell{display:grid;grid-template-columns:230px 1fr;gap:26px;align-items:start}
.aside{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;position:sticky;top:92px}
.aside .amenu{display:flex;flex-direction:column;gap:4px}
.aside .amenu button{text-align:left;background:none;border:none;padding:.6rem .7rem;border-radius:8px;font-size:.9rem;font-weight:500;color:var(--ink-2);display:flex;align-items:center;gap:.5rem}
.aside .amenu button:hover{background:var(--paper)}
.aside .amenu button.on{background:var(--blue-050);color:var(--blue-700);font-weight:600}
.aside .who{font-size:.8rem;color:var(--ink-3);padding:.4rem .7rem 1rem;border-bottom:1px solid var(--line);margin-bottom:10px}
.aside .who b{color:var(--ink);display:block;font-family:'Space Grotesk'}
.apanel{min-width:0}
.atop{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.atop h2{font-size:1.5rem}
.arow{background:#fff;border:1px solid var(--line);border-radius:11px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.arow .ai{font-size:1.5rem;flex:0 0 auto}
.arow .am{flex:1;min-width:0}
.arow .am b{font-size:.98rem;display:block}
.arow .am small{color:var(--ink-3);font-size:.8rem}
.arow .aact{display:flex;gap:.4rem;flex:0 0 auto}
.icbtn{border:1px solid var(--line-2);background:#fff;border-radius:7px;padding:.4rem .7rem;font-size:.8rem;font-weight:600;color:var(--ink-2)}
.icbtn:hover{border-color:var(--ink);color:var(--ink)}
.icbtn.del:hover{border-color:#e0564f;color:#e0564f}
.login-wrap{max-width:380px;margin:40px auto;text-align:center}
.login-wrap .lk{width:60px;height:60px;border-radius:16px;background:var(--ink);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.login-wrap .lk svg{width:28px;height:28px;stroke:var(--blue);fill:none;stroke-width:1.6}

/* toast / notice */
.notice{background:#eafaf1;border:1px solid #b6e6cb;color:#1c7a48;padding:.8rem 1rem;border-radius:10px;font-size:.9rem;margin-bottom:16px}
.notice.warn{background:#fff7ec;border-color:#f3d49a;color:#9a6a16}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
  padding:.8rem 1.3rem;border-radius:100px;font-size:.9rem;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transition:.3s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:60px 20px;color:var(--ink-3)}
.empty .ee{font-size:2.4rem;margin-bottom:10px}

/* mobile nav */
.mobile-menu{display:none;position:fixed;inset:70px 0 0;background:#fff;z-index:49;padding:24px;flex-direction:column;gap:.3rem;overflow:auto}
.mobile-menu.open{display:flex}
.mobile-menu a{padding:.9rem 1rem;border-radius:10px;font-weight:500;font-size:1.05rem;color:var(--ink)}
.mobile-menu a:hover{background:var(--paper)}
.mobile-menu .btn{margin-top:1rem}

@media(max-width:980px){
  .hero-grid{grid-template-columns:1fr;gap:30px}
  .cols-4{grid-template-columns:repeat(2,1fr)}
  .cols-3{grid-template-columns:repeat(2,1fr)}
  .feat{grid-template-columns:1fr 1fr}
  .sol{grid-template-columns:repeat(2,1fr)}
  .solpanel{grid-template-columns:1fr}.solpanel .pic{display:none}
  .fgrid{grid-template-columns:1fr 1fr}
  .bloglist,.forum-cats{grid-template-columns:1fr 1fr}
  .admin-shell{grid-template-columns:1fr}.aside{position:static}
}
@media(max-width:680px){
  .nav-links{display:none}.burger{display:flex}
  .nav-cta .btn:not(.burger){display:none}
  .cols-4,.cols-3,.feat,.sol,.bloglist,.forum-cats,.fgrid,.frow,.stats .wrap{grid-template-columns:1fr}
  .stats .wrap{gap:30px}
  section{padding:60px 0}
  .ctaband{padding:34px}
  .topic .rc{display:none}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .stratum,.mass,.gw,.fspill{opacity:1!important;transform:none!important}
  .slipline{stroke-dashoffset:0!important}
}
</style>

<script>
/* ============================================================
   Dias Logic — tek dosyalık geoteknik yazılım sitesi
   Veri kalıcılığı: Claude artifact storage (window.storage)
   ============================================================ */

/* ---------- depolama katmanı (kalıcı + bellek yedeği) ---------- */
const mem = {};
const HAS_STORE = typeof window!=='undefined' && window.storage && typeof window.storage.get==='function';
async function dbGet(key, def){
  if(HAS_STORE){
    try{ const r = await window.storage.get(key); return r ? JSON.parse(r.value) : def; }
    catch(e){ return (key in mem) ? mem[key] : def; }
  }
  return (key in mem) ? mem[key] : def;
}
async function dbSet(key, val){
  mem[key] = val;
  if(HAS_STORE){ try{ await window.storage.set(key, JSON.stringify(val)); }catch(e){} }
}

/* ---------- yardımcılar ---------- */
const $ = s=>document.querySelector(s);
const esc = s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = p=>p+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmtDate = d=>{ const x=new Date(d); return x.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'}); };
const ago = d=>{ const s=(Date.now()-new Date(d))/1000; if(s<60)return 'az önce'; if(s<3600)return Math.floor(s/60)+' dk önce';
  if(s<86400)return Math.floor(s/3600)+' saat önce'; if(s<2592000)return Math.floor(s/86400)+' gün önce'; return fmtDate(d); };
const initials = n=>n.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
function mdToHtml(src){
  const lines = String(src||'').replace(/\r/g,'').split('\n');
  let html='', inList=false;
  const inline = t=>esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  for(let ln of lines){
    if(/^\s*-\s+/.test(ln)){ if(!inList){html+='<ul>';inList=true;} html+='<li>'+inline(ln.replace(/^\s*-\s+/,''))+'</li>'; continue; }
    if(inList){html+='</ul>';inList=false;}
    if(/^###?\s+/.test(ln)){ html+='<h3>'+inline(ln.replace(/^###?\s+/,''))+'</h3>'; continue; }
    if(ln.trim()==='') continue;
    html+='<p>'+inline(ln)+'</p>';
  }
  if(inList)html+='</ul>';
  return html;
}

    <button class="btn btn-primary btn-block" onclick="adminLogin()">Giriş Yap</button>
    <p style="color:var(--ink-3);font-size:.78rem;margin-top:16px">Varsayılan şifre: <b class="mono">dias2025</b> — Ayarlar\u2019dan değiştirebilirsiniz.</p>
  </div></div></div>`;
}
window.adminLogin = function(){
  const pw=$('#adminPw').value;
  if(pw===state.adminPass){ state.isAdmin=true; state.adminTab='dash'; render(); toast('Hoş geldiniz'); }
  else { $('#loginMsg').innerHTML='<div class="notice warn">Şifre hatalı. Tekrar deneyin.</div>'; }
};
window.adminLogout = function(){ state.isAdmin=false; render(); toast('Çıkış yapıldı'); };
window.adminTab = function(t){ state.adminTab=t; state.editing=null; render(); };

function adminPanel(){
  if(state.adminTab==='dash') return adminDash();
  if(state.adminTab==='blog') return state.editing!==null?adminBlogForm():adminBlogList();
  if(state.adminTab==='topics') return state.editing!==null?adminTopicForm():adminTopicList();
  if(state.adminTab==='cats') return adminCats();
  if(state.adminTab==='settings') return adminSettings();
  return '';
}
function adminDash(){
  const totalReplies = state.topics.reduce((s,t)=>s+(t.replies||[]).length,0);
  const stat=(n,l,e)=>`<div class="card" style="text-align:center"><div style="font-size:1.6rem;margin-bottom:6px">${e}</div><div class="mono" style="font-size:2rem;font-weight:700;color:var(--blue-700);font-family:'Space Grotesk'">${n}</div><div style="color:var(--ink-2);font-size:.85rem">${l}</div></div>`;
  return `<div class="atop"><h2>Genel Bakış</h2></div>
    <div class="grid cols-4" style="margin-bottom:26px">
      ${stat(state.blog.length,'Blog yazısı','📝')}${stat(state.topics.length,'Forum konusu','💬')}
      ${stat(totalReplies,'Toplam yanıt','↩️')}${stat(state.fcats.length,'Kategori','🗂️')}
    </div>
    <div class="card"><h3 style="margin-bottom:.5rem">Hızlı işlemler</h3>
      <p style="color:var(--ink-2);font-size:.9rem;margin-bottom:14px">Buradan içerik ekleyebilir, mevcut yazı ve konuları düzenleyebilirsiniz.</p>
      <div style="display:flex;gap:.6rem;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="newPost()">+ Yeni Blog Yazısı</button>
        <button class="btn btn-ghost btn-sm" onclick="newTopic()">+ Yeni Forum Konusu</button>
        <button class="btn btn-ghost btn-sm" onclick="adminTab('cats')">Kategori Yönet</button>
      </div>
    </div>`;
}

/* --- blog yönetimi --- */
function adminBlogList(){
  return `<div class="atop"><h2>Blog Yazıları</h2><button class="btn btn-primary btn-sm" onclick="newPost()">+ Yeni Yazı</button></div>
    ${state.blog.length?state.blog.map(p=>`<div class="arow">
      <div class="ai">${p.emoji||'📄'}</div>
      <div class="am"><b>${esc(p.title)}</b><small>${esc(p.category)} · ${fmtDate(p.date)} · ${esc(p.author)}</small></div>
      <div class="aact">
        <button class="icbtn" onclick="editPost('${p.id}')">Düzenle</button>
        <button class="icbtn del" onclick="delPost('${p.id}')">Sil</button>
      </div></div>`).join(''):`<div class="empty"><div class="ee">📝</div>Henüz yazı yok.</div>`}`;
}
window.newPost = function(){ state.adminTab='blog'; state.editing={id:null,title:'',category:'Teknik',author:'Dias Logic Ekibi',emoji:'📄',cover:0,date:new Date().toISOString().slice(0,10),summary:'',body:''}; render(); };
window.editPost = function(id){ const p=state.blog.find(x=>x.id===id); state.adminTab='blog'; state.editing=JSON.parse(JSON.stringify(p)); render(); };
window.delPost = async function(id){ if(!confirm('Bu yazıyı silmek istediğinize emin misiniz?'))return;
  state.blog=state.blog.filter(x=>x.id!==id); await dbSet('dl_blog',state.blog); toast('Yazı silindi'); render(); };
function adminBlogForm(){
  const e=state.editing; const emojis=['📄','⛰️','🌊','🧱','🏗️','📐','🔬','📊','⚙️','🪨'];
  return `<div class="atop"><h2>${e.id?'Yazıyı Düzenle':'Yeni Blog Yazısı'}</h2><button class="btn btn-ghost btn-sm" onclick="adminTab('blog')">← Geri</button></div>
  <div class="formcard">
    <div class="field"><label>Başlık</label><input id="f_title" value="${esc(e.title)}" placeholder="Yazı başlığı"></div>
    <div class="frow">
      <div class="field"><label>Kategori</label><input id="f_cat" value="${esc(e.category)}" placeholder="örn. Teknik"></div>
      <div class="field"><label>Yazar</label><input id="f_author" value="${esc(e.author)}"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Tarih</label><input id="f_date" type="date" value="${esc(e.date)}"></div>
      <div class="field"><label>Kapak rengi</label><select id="f_cover">${COVERS.map((c,i)=>`<option value="${i}" ${e.cover==i?'selected':''}>Tema ${i+1}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Kapak simgesi</label>
      <div id="emojiPick" style="display:flex;gap:.4rem;flex-wrap:wrap">${emojis.map(em=>`<button type="button" class="icbtn" style="font-size:1.1rem;${e.emoji===em?'border-color:var(--blue);background:var(--blue-050)':''}" onclick="pickEmoji('${em}')">${em}</button>`).join('')}</div>
    </div>
    <div class="field"><label>Özet</label><textarea id="f_summary" style="min-height:70px" placeholder="Kart üzerinde görünecek kısa özet">${esc(e.summary)}</textarea></div>
    <div class="field"><label>İçerik</label><textarea id="f_body" style="min-height:260px" placeholder="Yazı içeriği...">${esc(e.body)}</textarea>
      <div class="hint">Biçimlendirme: <b class="mono">## Başlık</b> · <b class="mono">- madde</b> · <b class="mono">**kalın**</b> · boş satır = yeni paragraf</div></div>
    <div style="display:flex;gap:.6rem">
      <button class="btn btn-primary" onclick="savePost()">${e.id?'Değişiklikleri Kaydet':'Yazıyı Yayınla'}</button>
      <button class="btn btn-ghost" onclick="adminTab('blog')">İptal</button>
    </div>
  </div>`;
}
window.pickEmoji = function(em){ state.editing.emoji=em; render(); };
window.savePost = async function(){
  const e=state.editing;
  e.title=$('#f_title').value.trim(); e.category=$('#f_cat').value.trim()||'Genel';
  e.author=$('#f_author').value.trim()||'Dias Logic Ekibi'; e.date=$('#f_date').value||new Date().toISOString().slice(0,10);
  e.cover=parseInt($('#f_cover').value)||0; e.summary=$('#f_summary').value.trim(); e.body=$('#f_body').value;
  if(!e.title){ toast('Lütfen bir başlık girin'); return; }
  if(!e.summary) e.summary = e.body.slice(0,140);
  if(e.id){ const i=state.blog.findIndex(x=>x.id===e.id); state.blog[i]=e; toast('Yazı güncellendi'); }
  else { e.id=uid('p'); state.blog.unshift(e); toast('Yazı yayınlandı'); }
  await dbSet('dl_blog',state.blog); state.editing=null; render();
};

/* --- forum konu yönetimi --- */
function adminTopicList(){
  const sorted=state.topics.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  return `<div class="atop"><h2>Forum Konuları</h2><button class="btn btn-primary btn-sm" onclick="newTopic()">+ Yeni Konu</button></div>
    ${sorted.length?sorted.map(t=>{const c=state.fcats.find(x=>x.id===t.cat);return `<div class="arow">
      <div class="ai">💬</div>
      <div class="am"><b>${esc(t.title)}</b><small>${esc(c?c.name:'—')} · ${esc(t.author)} · ${(t.replies||[]).length} yanıt · ${fmtDate(t.date)}</small></div>
      <div class="aact">
        <a class="icbtn" href="#/konu/${t.id}">Görüntüle</a>
        <button class="icbtn" onclick="editTopic('${t.id}')">Düzenle</button>
        <button class="icbtn del" onclick="delTopic('${t.id}')">Sil</button>
      </div></div>`}).join(''):`<div class="empty"><div class="ee">💬</div>Henüz konu yok.</div>`}`;
}
window.newTopic = function(){ state.adminTab='topics'; state.editing={id:null,cat:state.fcats[0]?.id,title:'',author:'Dias Logic Ekibi',body:'',date:new Date().toISOString().slice(0,10),replies:[]}; render(); };
window.editTopic = function(id){ const t=state.topics.find(x=>x.id===id); state.adminTab='topics'; state.editing=JSON.parse(JSON.stringify(t)); render(); };
window.delTopic = async function(id){ if(!confirm('Bu konuyu silmek istediğinize emin misiniz?'))return;
  state.topics=state.topics.filter(x=>x.id!==id); await dbSet('dl_topics',state.topics); toast('Konu silindi'); render(); };
function adminTopicForm(){
  const e=state.editing;
  return `<div class="atop"><h2>${e.id?'Konuyu Düzenle':'Yeni Forum Konusu'}</h2><button class="btn btn-ghost btn-sm" onclick="adminTab('topics')">← Geri</button></div>
  <div class="formcard">
    <div class="frow">
      <div class="field"><label>Kategori</label><select id="t_cat">${state.fcats.map(c=>`<option value="${c.id}" ${e.cat===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <div class="field"><label>Yazar</label><input id="t_author" value="${esc(e.author)}"></div>
    </div>
    <div class="field"><label>Başlık</label><input id="t_title" value="${esc(e.title)}" placeholder="Konu başlığı"></div>
    <div class="field"><label>İçerik</label><textarea id="t_body" style="min-height:160px" placeholder="Konu metni...">${esc(e.body)}</textarea></div>
    ${e.id&&(e.replies||[]).length?`<div class="field"><label>Yanıtlar (${e.replies.length})</label>
      ${e.replies.map(r=>`<div class="arow"><div class="am"><b>${esc(r.author)}</b><small>${esc(r.body).slice(0,80)}</small></div>
        <button class="icbtn del" onclick="delReply('${e.id}','${r.id}')">Sil</button></div>`).join('')}</div>`:''}
    <div style="display:flex;gap:.6rem">
      <button class="btn btn-primary" onclick="saveTopic()">${e.id?'Kaydet':'Konuyu Yayınla'}</button>
      <button class="btn btn-ghost" onclick="adminTab('topics')">İptal</button>
    </div>
  </div>`;
}
window.saveTopic = async function(){
  const e=state.editing;
  e.cat=$('#t_cat').value; e.author=$('#t_author').value.trim()||'Dias Logic Ekibi';
  e.title=$('#t_title').value.trim(); e.body=$('#t_body').value.trim();
  if(!e.title||!e.body){ toast('Başlık ve içerik gerekli'); return; }
  if(!e.date.includes('T')) e.date=new Date(e.date).toISOString();
  if(e.id){ const i=state.topics.findIndex(x=>x.id===e.id); state.topics[i]=e; toast('Konu güncellendi'); }
  else { e.id=uid('t'); e.date=new Date().toISOString(); e.replies=[]; state.topics.unshift(e); toast('Konu yayınlandı'); }
  await dbSet('dl_topics',state.topics); state.editing=null; render();
};
window.delReply = async function(tid,rid){ const t=state.topics.find(x=>x.id===tid); if(!t)return;
  t.replies=t.replies.filter(r=>r.id!==rid); await dbSet('dl_topics',state.topics);
  state.editing=JSON.parse(JSON.stringify(t)); toast('Yanıt silindi'); render(); };

/* --- kategori yönetimi --- */
function adminCats(){
  return `<div class="atop"><h2>Forum Kategorileri</h2></div>
    <div class="formcard" style="margin-bottom:18px">
      <h3 style="font-size:1.05rem;margin-bottom:14px">Yeni kategori ekle</h3>
      <div class="frow">
        <div class="field"><label>Simge (emoji)</label><input id="nc_emoji" value="📁" maxlength="2"></div>
        <div class="field"><label>Kategori adı</label><input id="nc_name" placeholder="örn. Sıvılaşma"></div>
      </div>
      <div class="field"><label>Açıklama</label><input id="nc_desc" placeholder="Kısa açıklama"></div>
      <button class="btn btn-primary" onclick="addCat()">Kategori Ekle</button>
    </div>
    ${state.fcats.map(c=>`<div class="arow"><div class="ai">${c.emoji}</div>
      <div class="am"><b>${esc(c.name)}</b><small>${esc(c.desc)} · ${state.topics.filter(t=>t.cat===c.id).length} konu</small></div>
      <button class="icbtn del" onclick="delCat('${c.id}')">Sil</button></div>`).join('')}`;
}
window.addCat = async function(){
  const name=$('#nc_name').value.trim(); if(!name){ toast('Kategori adı gerekli'); return; }
  state.fcats.push({id:uid('c'),name,emoji:$('#nc_emoji').value.trim()||'📁',desc:$('#nc_desc').value.trim()||''});
  await dbSet('dl_fcats',state.fcats); toast('Kategori eklendi'); render();
};
window.delCat = async function(id){
  if(state.topics.some(t=>t.cat===id)){ if(!confirm('Bu kategoride konular var. Yine de silinsin mi? (Konular kategorisiz kalır)'))return; }
  else if(!confirm('Kategoriyi silmek istediğinize emin misiniz?'))return;
  state.fcats=state.fcats.filter(c=>c.id!==id); await dbSet('dl_fcats',state.fcats); toast('Kategori silindi'); render();
};

/* --- ayarlar --- */
function adminSettings(){
  return `<div class="atop"><h2>Ayarlar</h2></div>
  <div class="formcard" style="max-width:480px">
    <h3 style="font-size:1.05rem;margin-bottom:14px">Yönetici şifresini değiştir</h3>
    <div id="pwMsg"></div>
    <div class="field"><label>Mevcut şifre</label><input id="s_old" type="password"></div>
    <div class="field"><label>Yeni şifre</label><input id="s_new" type="password"></div>
    <button class="btn btn-primary" onclick="changePass()">Şifreyi Güncelle</button>
  </div>
  <div class="formcard" style="max-width:480px;margin-top:18px">
    <h3 style="font-size:1.05rem;margin-bottom:8px">Verileri sıfırla</h3>
    <p style="color:var(--ink-2);font-size:.88rem;margin-bottom:14px">Tüm blog ve forum içeriğini başlangıç değerlerine döndürür.</p>
    <button class="btn btn-ghost" style="color:#e0564f;border-color:#f1c0bc" onclick="resetData()">Başlangıç verilerine dön</button>
  </div>`;
}
window.changePass = async function(){
  const o=$('#s_old').value, n=$('#s_new').value.trim();
  if(o!==state.adminPass){ $('#pwMsg').innerHTML='<div class="notice warn">Mevcut şifre yanlış.</div>'; return; }
  if(n.length<4){ $('#pwMsg').innerHTML='<div class="notice warn">Yeni şifre en az 4 karakter olmalı.</div>'; return; }
  state.adminPass=n; await dbSet('dl_pass',n); $('#pwMsg').innerHTML='<div class="notice">Şifre güncellendi.</div>'; toast('Şifre değiştirildi');
};
window.resetData = async function(){
  if(!confirm('Tüm içerik başlangıç değerlerine dönecek. Emin misiniz?'))return;
  state.blog=JSON.parse(JSON.stringify(SEED_BLOG)); state.fcats=JSON.parse(JSON.stringify(SEED_FCATS)); state.topics=JSON.parse(JSON.stringify(SEED_TOPICS));
  await dbSet('dl_blog',state.blog); await dbSet('dl_fcats',state.fcats); await dbSet('dl_topics',state.topics);
  toast('Veriler sıfırlandı'); render();
};

/* ---- ortak parçalar ---- */
function pageHd(title,eyebrow,sub){

    <div class="eyebrow">${esc(eyebrow)}</div>
    <h1>${esc(title)}</h1>${sub?`<p>${esc(sub)}</p>`:''}
  </div></div>`;
}
function view404(){
  return `<div class="page"><div class="wrap"><div class="empty">
    <div class="ee">🧭</div><h2>Sayfa bulunamadı</h2>
    <p>Aradığınız içerik taşınmış olabilir.</p><a href="#/" class="btn btn-primary btn-sm" style="margin-top:12px">Ana Sayfaya Dön</a>
  </div></div></div>`;
}

/* ============================================================
   YÖNLENDİRME
   ============================================================ */
function render(){
  const hash = location.hash || '#/';
  const seg = hash.replace(/^#\//,'').split('/');
  const root = seg[0]||'';
  let html='';
  switch(root){
    case '': html=viewHome(); break;
    case 'yazilimlar': html=viewProducts(); break;
    case 'yazilim': html=viewProduct(seg[1]); break;
    case 'cozumler': html=viewSolutions(); break;
    case 'blog': html=seg[1]?viewArticle(seg[1]):viewBlog(); break;
    case 'forum': html=viewForum(); break;
    case 'konu': html=viewTopic(seg[1]); break;
    case 'hakkimizda': html=viewAbout(); break;
    case 'iletisim': html=viewContact(); break;
    case 'yonetici': html=viewAdmin(); break;
    default: html=view404();
  }
  document.getElementById('app').innerHTML=html;
  // aktif nav
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.toggle('active', (a.dataset.r||'')===root));
  // hero animasyonu
  if(root===''){ setTimeout(animateFs,300); }
  window.scrollTo({top:0,behavior:'instant'in window?'instant':'auto'});
  // mobil menü kapat
  document.getElementById('mobileMenu').classList.remove('open');
}

/* mobil menü */
document.getElementById('burger').addEventListener('click',()=>document.getElementById('mobileMenu').classList.toggle('open'));
document.getElementById('mobileMenu').addEventListener('click',e=>{ if(e.target.tagName==='A')document.getElementById('mobileMenu').classList.remove('open'); });

window.addEventListener('hashchange',render);
(async function init(){
  await loadData();
  render();
})();
</script>
